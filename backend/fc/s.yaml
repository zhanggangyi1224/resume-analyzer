edition: 3.0.0
name: resume-analyzer

resources:
  resume-analyzer-api:
    component: fc3
    props:
      region: cn-hangzhou
      functionName: resume-analyzer-api
      description: AI-powered resume analyzer backend
      memorySize: 1024
      timeout: 60
      runtime: custom-container
      customContainerConfig:
        image: <your-acr-namespace>/resume-analyzer:latest
        port: 9000
      environmentVariables:
        API_PREFIX: /api/v1
        CACHE_TTL_SECONDS: 3600
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
